<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenTask — Daily Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.09);
      --gold: #e8c97e;
      --gold-dim: rgba(232,201,126,0.15);
      --gold-glow: rgba(232,201,126,0.35);
      --rose: #f28b82;
      --teal: #6ecfc8;
      --text: #f0ede6;
      --muted: rgba(240,237,230,0.45);
      --green: #81c784;
      --green-dim: rgba(129,199,132,0.15);
      --radius: 18px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated Aurora Background ── */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .aurora::before, .aurora::after, .aurora-3 {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .aurora::before {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #6a4c9c, transparent 70%);
      top: -150px; left: -100px;
      animation-duration: 18s;
    }
    .aurora::after {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #1a5f7a, transparent 70%);
      bottom: -100px; right: -80px;
      animation-duration: 13s;
      animation-direction: alternate-reverse;
    }
    .aurora-3 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #9c4a6a, transparent 70%);
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 20s;
      opacity: 0.12;
    }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 40px) scale(1.15); }
    }

    /* Noise overlay */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.8s ease both;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: var(--gold-dim);
      border: 1px solid var(--gold);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 0.04em;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(135deg, #f0ede6 30%, #e8c97e 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    /* ── Date / Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 14px;
      margin-bottom: 32px;
      animation: fadeDown 0.8s 0.1s ease both;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
      backdrop-filter: blur(12px);
    }
    .stat-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold-glow);
    }
    .stat-pill strong { color: var(--text); }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.07);
      animation: fadeUp 0.8s 0.15s ease both;
    }

    /* ── Input Area ── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .input-wrap {
      flex: 1;
      position: relative;
    }
    .input-wrap .prefix-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }
    input[type="text"] {
      width: 100%;
      padding: 15px 16px 15px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .priority-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .priority-btn {
      flex: 1;
      padding: 9px 6px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .priority-btn:hover { background: var(--surface-hover); color: var(--text); }
    .priority-btn.active-high { background: rgba(242,139,130,0.15); border-color: var(--rose); color: var(--rose); }
    .priority-btn.active-med { background: rgba(232,201,126,0.15); border-color: var(--gold); color: var(--gold); }
    .priority-btn.active-low { background: rgba(110,207,200,0.15); border-color: var(--teal); color: var(--teal); }

    .add-btn {
      padding: 15px 22px;
      background: var(--gold);
      border: none;
      border-radius: var(--radius);
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 20px var(--gold-glow);
    }
    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--gold-glow);
      background: #f0d898;
    }
    .add-btn:active { transform: scale(0.97); }

    /* ── Filter Tabs ── */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 5px;
    }
    .tab {
      flex: 1;
      padding: 9px 10px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: rgba(232,201,126,0.12);
      color: var(--gold);
      border: 1px solid rgba(232,201,126,0.25);
    }

    /* ── Task List ── */
    #taskList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 40px;
    }

    li.task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform 0.22s, box-shadow 0.22s, opacity 0.3s, background 0.2s;
      animation: slideIn 0.35s ease both;
      cursor: default;
    }
    li.task-item:hover {
      transform: translateY(-2px);
      background: var(--surface-hover);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    li.task-item.removing {
      animation: slideOut 0.3s ease forwards;
    }

    /* Custom Checkbox */
    .check-wrap {
      flex-shrink: 0;
    }
    .check-wrap input[type="checkbox"] { display: none; }
    .check-wrap label {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      color: transparent;
      user-select: none;
    }
    .check-wrap input:checked + label {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    .task-body { flex: 1; min-width: 0; }
    .task-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      transition: all 0.25s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-item.done .task-name {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .task-time {
      font-size: 11px;
      color: var(--muted);
    }
    .priority-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 100px;
    }
    .badge-high { background: rgba(242,139,130,0.15); color: var(--rose); border: 1px solid rgba(242,139,130,0.3); }
    .badge-med { background: rgba(232,201,126,0.15); color: var(--gold); border: 1px solid rgba(232,201,126,0.3); }
    .badge-low { background: rgba(110,207,200,0.15); color: var(--teal); border: 1px solid rgba(110,207,200,0.3); }

    .task-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .icon-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--text); }
    .icon-btn.del:hover { background: rgba(242,139,130,0.15); border-color: rgba(242,139,130,0.4); color: var(--rose); }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      display: none;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Progress Bar ── */
    .progress-wrap {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-label span:last-child { color: var(--gold); font-weight: 600; }
    .progress-track {
      height: 6px;
      background: var(--surface);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 10px var(--gold-glow);
      width: 0%;
    }

    /* ── Motivational Quote ── */
    .quote-bar {
      max-width: 560px;
      width: 100%;
      margin-top: 20px;
      padding: 16px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeUp 0.8s 0.3s ease both;
    }
    .quote-icon { font-size: 22px; flex-shrink: 0; }
    .quote-text { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.5; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 12px 24px;
      font-size: 13px;
      color: var(--text);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 1.2s ease forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(200px) rotate(540deg) scale(0.3); opacity: 0; }
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-18px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideOut {
      to { opacity: 0; transform: translateX(20px) scale(0.95); max-height: 0; margin: 0; padding: 0; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 22px 18px; }
      .priority-row { flex-wrap: wrap; }
      .priority-btn { flex: 1 1 calc(33% - 6px); }
    }
  </style>
</head>
<body>

<div class="aurora"><div class="aurora-3"></div></div>
<div class="noise"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <h1>Your Day, Mastered.</h1>
    <p class="tagline">Elegant task management for focused minds</p>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-pill"><span class="dot"></span><span id="dateLabel">Today</span></div>
    <div class="stat-pill">📋 <strong id="totalCount">0</strong>&nbsp;tasks</div>
    <div class="stat-pill">✅ <strong id="doneCount">0</strong>&nbsp;done</div>
    <div class="stat-pill">⚡ <strong id="pendingCount">0</strong>&nbsp;pending</div>
  </div>

  <!-- Main Card -->
  <div class="card">

    <!-- Input -->
    <div class="input-row">
      <div class="input-wrap">
        <span class="prefix-icon">✏️</span>
        <input type="text" id="taskInput" placeholder="What needs to be done today?" />
      </div>
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>

    <!-- Priority -->
    <div class="priority-row">
      <button class="priority-btn" id="btn-high" onclick="setPriority('high')">🔴 High</button>
      <button class="priority-btn active-med" id="btn-med" onclick="setPriority('med')">🟡 Medium</button>
      <button class="priority-btn" id="btn-low" onclick="setPriority('low')">🟢 Low</button>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all', this)">All</button>
      <button class="tab" onclick="setFilter('pending', this)">Pending</button>
      <button class="tab" onclick="setFilter('done', this)">Completed</button>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="icon">🌿</div>
      <p>Your task list is clear.<br>Add something to get started!</p>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Daily Progress</span>
        <span id="progressLabel">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

  </div>

  <!-- Quote -->
  <div class="quote-bar">
    <span class="quote-icon">💡</span>
    <span class="quote-text" id="quoteText">"The secret of getting ahead is getting started." — Mark Twain</span>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let tasks = JSON.parse(localStorage.getItem('zentask') || '[]');
  let currentPriority = 'med';
  let currentFilter = 'all';
  let taskIdCounter = Date.now();

  const quotes = [
    '"The secret of getting ahead is getting started." — Mark Twain',
    '"Focus on being productive instead of busy." — Tim Ferriss',
    '"It always seems impossible until it\'s done." — Nelson Mandela',
    '"Done is better than perfect." — Sheryl Sandberg',
    '"Small steps, every day." — Anonymous',
    '"Your future is created by what you do today." — Robert Kiyosaki',
    '"One task at a time, done well." — ZenTask',
    '"Clarity is power. Know what matters." — Anonymous',
  ];

  // ── Init ──
  function init() {
    updateDate();
    setRandomQuote();
    renderAll();
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
  }

  function updateDate() {
    const d = new Date();
    const opts = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('dateLabel').textContent = d.toLocaleDateString('en-US', opts);
  }

  function setRandomQuote() {
    document.getElementById('quoteText').textContent = quotes[Math.floor(Math.random() * quotes.length)];
  }

  // ── Priority ──
  function setPriority(p) {
    currentPriority = p;
    document.querySelectorAll('.priority-btn').forEach(b => b.className = 'priority-btn');
    document.getElementById('btn-' + p).classList.add('active-' + p);
  }

  // ── Filter ──
  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderAll();
  }

  // ── Add Task ──
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) { showToast('⚠️ Please enter a task!'); shakeInput(); return; }

    const task = {
      id: ++taskIdCounter,
      text,
      priority: currentPriority,
      done: false,
      time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
    };
    tasks.unshift(task);
    save();
    renderAll();
    input.value = '';
    showToast('✨ Task added!');
  }

  // ── Toggle ──
  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    save();
    renderAll();
    if (t.done) {
      spawnConfetti();
      showToast('🎉 Task completed! Great job!');
      setRandomQuote();
    }
  }

  // ── Delete ──
  function deleteTask(id) {
    const li = document.querySelector(`[data-id="${id}"]`);
    if (li) {
      li.classList.add('removing');
      li.addEventListener('animationend', () => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        renderAll();
      }, { once: true });
    }
  }

  // ── Render ──
  function renderAll() {
    const list = document.getElementById('taskList');
    let filtered = tasks.filter(t => {
      if (currentFilter === 'pending') return !t.done;
      if (currentFilter === 'done') return t.done;
      return true;
    });

    list.innerHTML = '';
    filtered.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-item' + (t.done ? ' done' : '');
      li.setAttribute('data-id', t.id);

      const badge = { high: 'badge-high', med: 'badge-med', low: 'badge-low' }[t.priority];
      const label = { high: '🔴 High', med: '🟡 Medium', low: '🟢 Low' }[t.priority];

      li.innerHTML = `
        <div class="check-wrap">
          <input type="checkbox" id="cb${t.id}" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
          <label for="cb${t.id}">✓</label>
        </div>
        <div class="task-body">
          <div class="task-name">${escHtml(t.text)}</div>
          <div class="task-meta">
            <span class="task-time">⏰ ${t.time}</span>
            <span class="priority-badge ${badge}">${label}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn del" title="Delete" onclick="deleteTask(${t.id})">🗑</button>
        </div>
      `;
      list.appendChild(li);
    });

    // Empty state
    document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';

    // Stats
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('pendingCount').textContent = total - done;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = pct + '%';
  }

  // ── Helpers ──
  function save() { localStorage.setItem('zentask', JSON.stringify(tasks)); }
  function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function shakeInput() {
    const el = document.getElementById('taskInput');
    el.style.animation = 'none';
    el.style.borderColor = 'var(--rose)';
    setTimeout(() => { el.style.borderColor = ''; }, 700);
  }

  function spawnConfetti() {
    const colors = ['#e8c97e','#f28b82','#6ecfc8','#b39ddb','#81c784'];
    for (let i = 0; i < 14; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `
        left:${Math.random() * 100}vw;
        top:${Math.random() * 60 + 10}vh;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        animation-delay:${Math.random() * 0.4}s;
        width:${Math.random() * 8 + 5}px;
        height:${Math.random() * 8 + 5}px;
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      `;
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }
  }

  init();
</script>
</body>
</html>
